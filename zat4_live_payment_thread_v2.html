<h2 class="sr-only">A playable mock Zat4 chat thread where you type, send a Bitcoin payment, approve it in a simulated wallet, and watch it settle.</h2>

<div style="display:flex; justify-content:center; padding:1rem 0;">
<div style="width:340px; background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:28px; overflow:hidden; font-family:var(--font-sans); position:relative;">

  <div style="display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:0.5px solid var(--color-border-tertiary); background:var(--color-background-secondary);">
    <div style="width:36px;height:36px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:var(--color-text-info);">M</div>
    <div style="flex:1;">
      <p style="font-size:15px;font-weight:500;margin:0;">Maya</p>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:0;">maya.zat</p>
    </div>
    <div style="display:flex;gap:4px;">
      <button onclick="ZAT.setRail('ln')" id="t-ln" style="font-size:11px;padding:4px 8px;min-height:0;border-radius:8px;border:0.5px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);">⚡</button>
      <button onclick="ZAT.setRail('oc')" id="t-oc" style="font-size:11px;padding:4px 8px;min-height:0;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);">⛓</button>
    </div>
  </div>

  <div id="thread" style="height:380px;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px;background:var(--color-background-tertiary);"></div>

  <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);">
    <button onclick="ZAT.openPay()" id="pay-btn" style="flex:0 0 auto;min-height:0;padding:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;"><i class="ti ti-currency-bitcoin"></i></button>
    <input id="msg" type="text" placeholder="Message" style="flex:1;height:34px;border-radius:18px;"/>
    <button onclick="ZAT.sendText()" style="flex:0 0 auto;min-height:0;padding:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;"><i class="ti ti-arrow-up"></i></button>
  </div>

  <div id="sheet" style="display:none;position:absolute;left:0;right:0;bottom:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-secondary);border-radius:18px 18px 28px 28px;padding:16px;box-sizing:border-box;"></div>

</div>
</div>

<script>
var ZAT = (function(){
  var thread = document.getElementById('thread');
  var sheet = document.getElementById('sheet');
  var rail = 'ln';
  var ri = 0;
  var replies = ["sounds good!","haha yeah ok","perfect","🙏","cool cool","awesome"];

  function scroll(){ thread.scrollTop = thread.scrollHeight; }

  function bubble(side, text){
    var mine = side==='me';
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:'+(mine?'flex-end':'flex-start')+';';
    var b = document.createElement('div');
    b.style.cssText = 'max-width:75%;padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.4;'+
      (mine ? 'background:var(--color-background-info);color:var(--color-text-info);border-bottom-right-radius:4px;'
            : 'background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);border-bottom-left-radius:4px;');
    b.textContent = text;
    wrap.appendChild(b); thread.appendChild(wrap); scroll();
  }

  function typing(cb){
    var wrap = document.createElement('div');
    wrap.style.cssText='display:flex;justify-content:flex-start;';
    wrap.innerHTML='<div style="padding:10px 14px;border-radius:16px;border-bottom-left-radius:4px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);font-size:14px;color:var(--color-text-tertiary);">•••</div>';
    thread.appendChild(wrap); scroll();
    setTimeout(function(){ wrap.remove(); if(cb)cb(); }, 1300);
  }

  function reply(){ var r = replies[ri % replies.length]; ri++; return r; }

  function setRail(r){
    rail = r;
    document.getElementById('t-ln').style.cssText='font-size:11px;padding:4px 8px;min-height:0;border-radius:8px;'+(r==='ln'?'border:0.5px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);':'border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);');
    document.getElementById('t-oc').style.cssText='font-size:11px;padding:4px 8px;min-height:0;border-radius:8px;'+(r==='oc'?'border:0.5px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);':'border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);');
  }

  function sendText(){
    var inp = document.getElementById('msg');
    var v = (inp.value||'').trim();
    if(!v) return;
    bubble('me', v); inp.value='';
    typing(function(){ bubble('them', reply()); });
  }

  function openPay(){
    var label = rail==='ln' ? '⚡ Lightning' : '⛓ On-chain';
    sheet.innerHTML =
      '<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 10px;">Send to Maya · '+label+'</p>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">'+
        chip(1000)+chip(5000)+chip(10000)+chip(25000)+
      '</div>'+
      '<input id="amt" type="text" placeholder="amount in sats" style="width:100%;box-sizing:border-box;height:36px;margin-bottom:8px;"/>'+
      '<input id="pnote" type="text" placeholder="note (optional)" style="width:100%;box-sizing:border-box;height:36px;margin-bottom:12px;"/>'+
      '<div style="display:flex;gap:8px;">'+
        '<button onclick="ZAT.closeSheet()" style="flex:0 0 auto;">Cancel</button>'+
        '<button onclick="ZAT.fireSend()" style="flex:1;border:2px solid var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);">Send</button>'+
      '</div>';
    sheet.style.display='block';
  }

  function chip(n){
    return '<span onclick="document.getElementById(\'amt\').value='+n+'" style="cursor:pointer;font-size:13px;padding:6px 12px;border-radius:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);">'+n.toLocaleString()+'</span>';
  }

  function closeSheet(){ sheet.style.display='none'; sheet.innerHTML=''; }

  function fireSend(){
    var raw = (document.getElementById('amt').value||'').replace(/[^0-9]/g,'');
    var amt = parseInt(raw,10) || 5000;
    var note = (document.getElementById('pnote').value||'').trim();
    closeSheet();
    walletApproval(amt, note);
  }

  function card(amt, note, state, conf){
    var wrap = document.createElement('div');
    wrap.style.cssText='display:flex;justify-content:flex-end;';
    var isLn = rail==='ln';
    var status;
    if(state==='pending'){
      status='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary);"><i class="ti ti-clock"></i> '+(isLn?'sending…':'broadcasting…')+'</div>';
    } else if(state==='conf'){
      var blocks='';
      for(var k=0;k<6;k++){ blocks+='<span style="width:14px;height:14px;border-radius:3px;background:'+(k<conf?'var(--color-background-info)':'transparent')+';border:0.5px solid '+(k<conf?'var(--color-border-info)':'var(--color-border-tertiary)')+';"></span>'; }
      status='<div style="display:flex;align-items:center;gap:5px;">'+blocks+'<span style="font-size:12px;color:var(--color-text-secondary);margin-left:4px;">'+conf+'/6</span></div>';
    } else if(state==='settled'){
      status='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-success);"><i class="ti ti-check"></i> settled</div>';
    } else {
      status='<div style="font-size:12px;color:var(--color-text-tertiary);">cancelled</div>';
    }
    wrap.innerHTML =
      '<div style="max-width:80%;background:var(--color-background-primary);border:0.5px solid '+(state==='cancel'?'var(--color-border-tertiary)':'var(--color-border-info)')+';border-radius:16px;border-bottom-right-radius:4px;padding:12px 14px;min-width:170px;">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><i class="ti ti-currency-bitcoin" style="color:var(--color-text-info);"></i><span style="font-size:11px;color:var(--color-text-tertiary);">'+(isLn?'Lightning':'On-chain')+'</span></div>'+
        '<p style="font-size:20px;font-weight:500;margin:0 0 2px;">'+amt.toLocaleString()+' <span style="font-size:13px;color:var(--color-text-secondary);">sats</span></p>'+
        (note?'<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 8px;">'+note.replace(/</g,'&lt;')+'</p>':'<div style="height:4px;"></div>')+
        status+
      '</div>';
    return wrap;
  }

  function walletApproval(amt, note){
    var isLn = rail==='ln';
    sheet.innerHTML =
      '<div style="background:#111;border-radius:14px;padding:18px 16px;">'+
        '<p style="font-size:12px;color:#9aa;margin:0 0 12px;text-align:center;letter-spacing:.3px;">YOUR WALLET</p>'+
        '<p style="font-size:13px;color:#bcd;margin:0 0 4px;text-align:center;">'+(isLn?'Lightning payment':'On-chain payment')+'</p>'+
        '<p style="font-size:28px;font-weight:500;margin:0 0 2px;text-align:center;color:#fff;">'+amt.toLocaleString()+' <span style="font-size:14px;color:#9aa;">sats</span></p>'+
        '<p style="font-size:13px;color:#9aa;margin:0 0 16px;text-align:center;">to maya.zat'+(isLn?'':' · fee: standard')+'</p>'+
        '<div style="display:flex;gap:10px;">'+
          '<button onclick="ZAT.decline()" style="flex:1;background:transparent;border:0.5px solid #444;color:#ccc;">Decline</button>'+
          '<button onclick="ZAT.approve()" style="flex:2;background:#2563eb;border:none;color:#fff;">'+(isLn?'Slide to pay':'Broadcast')+'</button>'+
        '</div>'+
      '</div>';
    sheet.style.display='block';
    ZAT._pending = {amt:amt, note:note};
  }

  function decline(){
    closeSheet();
    var p = ZAT._pending; if(!p) return;
    thread.appendChild(card(p.amt, p.note, 'cancel', 0)); scroll();
    ZAT._pending = null;
  }

  function approve(){
    closeSheet();
    var p = ZAT._pending; if(!p) return;
    var isLn = rail==='ln';
    var cur = card(p.amt, p.note, 'pending', 0);
    thread.appendChild(cur); scroll();
    if(isLn){
      setTimeout(function(){
        var c = card(p.amt, p.note, 'settled', 0);
        cur.replaceWith(c); scroll();
        typing(function(){ bubble('them','got it, thank you!! 🙏'); });
      }, 1200);
    } else {
      var conf=0;
      var c = card(p.amt, p.note, 'conf', 0);
      cur.replaceWith(c); scroll();
      var ref = c;
      var iv = setInterval(function(){
        conf++;
        var cN = (conf>=6) ? card(p.amt,p.note,'settled',6) : card(p.amt,p.note,'conf',conf);
        ref.replaceWith(cN); ref=cN; scroll();
        if(conf>=6){ clearInterval(iv); typing(function(){ bubble('them','confirmed, thanks!'); }); }
      }, 850);
    }
    ZAT._pending = null;
  }

  document.getElementById('msg').addEventListener('keydown', function(e){ if(e.key==='Enter') sendText(); });

  bubble('them','hey! did you sort out the dinner split?');
  setTimeout(function(){ bubble('them','i think it was about 5k sats each'); }, 600);

  return {setRail:setRail, sendText:sendText, openPay:openPay, closeSheet:closeSheet,
          fireSend:fireSend, decline:decline, approve:approve, _pending:null};
})();
</script>
